messages:
  prefix: '<dark_gray>[</dark_gray><gradient:#FFD166:#FF9F1C>ᴛᴏʀɴᴇᴏꜱ</gradient><dark_gray>]</dark_gray> <reset>'

  # ── Anuncios de torneo ────────────────────────────────────────────────────
  challenge-start:
    - ' '
    - '%prefix%<green>⚔ ¡Inició el torneo de <yellow>%challenge%</yellow>! ¡Compite por el top!</green>'
    - ' '
  # Línea corta y clickeable que se manda junto con challenge-start: explica qué cuenta
  # y al hacer click ejecuta "/torneos info <tipo>" para el detalle completo.
  challenge-start-hint: '%prefix%<click:run_command:"/torneos info %type_raw%"><hover:show_text:"<gray>Click para ver el detalle completo</gray>"><gray>%description% <dark_gray>(<yellow>click para más info</yellow>)</dark_gray></gray></hover></click>'
  challenge-end:
    - ' '
    - '%prefix%<red>⌛ El torneo de <yellow>%challenge%</yellow> terminó.</red>'
    - ' '
  challenge-end-top1: ' %prefix%<gold>🏆 #1 <yellow>%player%</yellow> <gray>— <aqua>%points% pts</aqua> <dark_gray>| <#FFD166>%reward%'
  challenge-end-top2: ' %prefix%<white>🥈 #2 <yellow>%player%</yellow> <gray>— <aqua>%points% pts</aqua> <dark_gray>| <#FFD166>%reward%'
  challenge-end-top3: ' %prefix%<white>🥉 #3 <yellow>%player%</yellow> <gray>— <aqua>%points% pts</aqua> <dark_gray>| <#FFD166>%reward%'
  challenge-end-no-participants: '%prefix%<gray>No hubo participantes en este torneo.'
  winner-private: '%prefix%<green>¡Felicidades! Ganaste el torneo de <yellow>%challenge%</yellow> con <aqua>%points%</aqua> puntos.</green>'
  outrank-private: '%prefix%<yellow>¡Has sido superado por <gold>%player%</gold>! Ahora va en el puesto <gold>#%rank%</gold>.</yellow>'
  outrank-self: '%prefix%<gray>Subiste al puesto <yellow>#%rank%</yellow> superando a <yellow>%count%</yellow> jugadores.</gray>'
  outrank-global: '%prefix%<aqua>%player%</aqua> <gray>ha superado a <yellow>%victim%</yellow> y subió al puesto <yellow>#%rank%</yellow>.</gray>'
  outrank-global-summary: '%prefix%<aqua>%player%</aqua> <gray>acaba de superar a <yellow>%count%</yellow> jugadores en el torneo.</gray>'

  # ── Nombres de los tipos de competencia (opcional) ───────────────────────
  # Si un tipo no se define acá, se usa el nombre por defecto embebido en el plugin.
  challenge-names:
    MINING: "ᴍɪɴᴇʀɪᴀ"
    WOODCUTTING: "ᴛᴀʟᴀ"
    FISHING: "ᴘᴇꜱᴄᴀ"
    SLAYER: "ᴄᴀᴢᴀ"
    FARMING: "ꜰᴀʀᴍᴇᴏ"
    OTONO: "ᴏᴛᴏɴ̃ᴏ"

  # ── Info: qué cuenta en cada tipo de torneo ──────────────────────────────
  info:
    header:
      - ' '
      - '<gradient:#FFD166:#FF9F1C>ᴛᴏʀɴᴇᴏꜱ</gradient> <#FFD166>— ¿Qué cuenta en cada torneo?'
    # Una línea por tipo. El tag <click> hace que al presionar sugiera (no ejecuta)
    # "/torneos info <tipo>" para ver el desglose completo de items/mobs.
    line: ' <#FFD166>⏵ <yellow>%challenge%</yellow> <#DDDDDD>— <white>%description%</white> <click:suggest_command:"/torneos info %type_raw%"><dark_gray>[<gray>ver detalle</gray>]</dark_gray></click>'
    detail-header: '<#DDDDDD>─────── <#FFD166>%challenge% <#DDDDDD>───────'
    detail-empty: ' <gray>No hay items configurados para este tipo todavía.'
    invalid-type: '%prefix%<red>Tipo inválido. Opciones: <yellow>%types%'
    descriptions:
      MINING: 'Romper cualquier mineral (carbón, hierro, oro, diamante, etc.)'
      WOODCUTTING: 'Romper cualquier tronco, de cualquier árbol'
      FISHING: 'Atrapar cualquier pez con caña de pescar'
      SLAYER: 'Matar cualquier mob hostil que haya aparecido de forma natural'
      FARMING: 'Cosechar cualquier cultivo (trigo, zanahorias, cacao, etc.)'
      OTONO: 'Evento especial de otoño: cosecha y follaje otoñal'

  # ── Estado / top ─────────────────────────────────────────────────────────
  status-no-active: '<#DDDDDD>No hay torneo activo en este momento.'
  status-active: '<green>Torneo activo:</green> <yellow>%challenge%</yellow> <gray>| Tiempo restante: <aqua>%time_left%</aqua></gray>'
  top-header: '<#DDDDDD>─────── <#FFD166>Top — <yellow>%challenge%</yellow> <#DDDDDD>───────'
  top-line: ' <#FFD166>⏵ <yellow>#%rank%</yellow> <white>%player%</white> <#DDDDDD>— <aqua>%points% pts</aqua>'
  top-empty: ' <#DDDDDD>No hay participantes todavía.'

  # ── Ayuda ────────────────────────────────────────────────────────────────
  help:
    general:
      - ' '
      - '<gradient:#FFD166:#FF9F1C>ᴛᴏʀɴᴇᴏꜱ</gradient> <#FFD166>Ayuda'
      - ' <#FFD166>⏵ <white>/%label% <#DDDDDD>| <#FFDC80>Ver estado del torneo activo'
      - ' <#FFD166>⏵ <white>/%label% status <#DDDDDD>| <#FFDC80>Estado del torneo actual'
      - ' <#FFD166>⏵ <white>/%label% top <#DDDDDD>| <#FFDC80>Ver el ranking actual'
      - ' <#FFD166>⏵ <white>/%label% info [tipo] <#DDDDDD>| <#FFDC80>Ver qué cuenta en cada torneo'
      - ' <#FFD166>⏵ <#FFDC80>/torneoadmin <#DDDDDD>| <#FFD166>Comandos de administrador'
      - ' '
    admin:
      - ' '
      - '<gradient:#FFD166:#FF9F1C>ᴛᴏʀɴᴇᴏꜱ</gradient> <#FFD166>Admin'
      - ' <#FFD166>⏵ <white>/%label% start <tipo> <#DDDDDD>| <#FFDC80>Iniciar torneo diario'
      - ' <#FFD166>⏵ <white>/%label% startuntilsunday <tipo> <#DDDDDD>| <#FFDC80>Iniciar hasta cierre del slot'
      - ' <#FFD166>⏵ <white>/%label% stop <#DDDDDD>| <#FFDC80>Detener con recompensas'
      - ' <#FFD166>⏵ <white>/%label% stopnorewards <#DDDDDD>| <#FFDC80>Detener sin recompensas'
      - ' <#FFD166>⏵ <white>/%label% startspecial <tipo> <#DDDDDD>| <#FFDC80>Iniciar evento especial'
      - ' <#FFD166>⏵ <white>/%label% stopspecial <#DDDDDD>| <#FFDC80>Detener evento especial con recompensas'
      - ' <#FFD166>⏵ <white>/%label% stopspecialnorewards <#DDDDDD>| <#FFDC80>Detener evento especial sin recompensas'
      - ' <#FFD166>⏵ <white>/%label% edit/addpoints/removepoints <j> <pts> <#DDDDDD>| <#FFDC80>Editar puntos diario'
      - ' <#FFD166>⏵ <white>/%label% editspecial/addpointsspecial/removepointsspecial <j> <pts> <#DDDDDD>| <#FFDC80>Editar puntos especial'
      - ' <#FFD166>⏵ <white>/%label% setduration <minutos> <#DDDDDD>| <#FFDC80>Cambiar duración'
      - ' <#FFD166>⏵ <white>/%label% resetplaced <#DDDDDD>· <white>refreshskins <#DDDDDD>· <white>reload <#DDDDDD>· <white>debug'
      - ' '

  # ── Mensajes comunes de comandos ─────────────────────────────────────────
  commands:
    invalid-subcommand: '%prefix%<red>Subcomando inválido. Usa <yellow>/%label% help</yellow> para ver los disponibles.'

  # ── Admin ────────────────────────────────────────────────────────────────
  admin:
    no-permission: '%prefix%<red>No tienes permiso para este subcomando.'
    usage-start: '%prefix%<red>Uso: <yellow>/%label% start <tipo>'
    usage-start-until-sunday: '%prefix%<red>Uso: <yellow>/%label% startuntilsunday <tipo>'
    usage-startspecial: '%prefix%<red>Uso: <yellow>/%label% startspecial <tipo>'
    started: '%prefix%<green>Torneo <yellow>%challenge%</yellow> iniciado correctamente.'
    started-until-sunday: '%prefix%<green>Torneo <yellow>%challenge%</yellow> iniciado hasta el cierre del slot.'
    started-special: '%prefix%<green>Evento especial <yellow>%challenge%</yellow> iniciado correctamente.'
    invalid-challenge: '%prefix%<red>Tipo inválido. Opciones: <yellow>%types%'
    no-active: '%prefix%<red>No hay torneo diario activo en este momento.'
    no-active-special: '%prefix%<red>No hay evento especial activo en este momento.'
    stopped: '%prefix%<green>Torneo finalizado correctamente. Recompensas entregadas.'
    stopped-special: '%prefix%<green>Evento especial finalizado correctamente. Recompensas entregadas.'
    stopped-no-rewards: '%prefix%<yellow>Torneo detenido sin entregar recompensas.'
    stopped-special-no-rewards: '%prefix%<yellow>Evento especial detenido sin entregar recompensas.'
    reload-success: '%prefix%<green>Configuración recargada correctamente.'
    usage-setduration: '%prefix%<red>Uso: <yellow>/%label% setduration <minutos>'
    invalid-number: '%prefix%<red>Debes ingresar un número válido.'
    min-duration: '%prefix%<red>La duración mínima es <yellow>1 minuto</yellow>.'
    duration-updated: '%prefix%<green>Duración actualizada a <yellow>%minutes% minutos</yellow>.'
    reset-placed: '%prefix%<green>Registro de bloques colocados reiniciado correctamente.'
    refreshskins-success: '%prefix%<green>Actualización de skins FancyNpcs ejecutada correctamente.'
    refreshskins-failed: '%prefix%<red>No se pudo actualizar skins. Verifica que FancyNpcs y skin-refresh estén habilitados.'
    invalid-subcommand: '%prefix%<red>Subcomando inválido. Usa <yellow>/%label% help</yellow> para ver los disponibles.'

  # ── Edición de puntos ────────────────────────────────────────────────────
  point-edit:
    usage: '%prefix%<red>Uso: <yellow>/%label% %operation% <jugador> <puntos>'
    no-active: '%prefix%<red>No hay torneo activo en este slot.'
    invalid-points: '%prefix%<red>El valor de puntos ingresado no es válido.'
    invalid-player: '%prefix%<red>No se encontró al jugador especificado.'
    updated: '%prefix%<green>Puntuación actualizada: <yellow>%player%</yellow> <#DDDDDD>→ <aqua>%points% pts</aqua>'

  # ── Debug ────────────────────────────────────────────────────────────────
  debug:
    header: '<#DDDDDD>─────── <aqua>vCompetition Debug <#DDDDDD>───────'
    db-connected: ' <#DDDDDD>⏵ <gray>DB conectada: <white>%value%'
    db-active-tasks: ' <#DDDDDD>⏵ <gray>DB tareas activas: <white>%value%'
    db-queue-size: ' <#DDDDDD>⏵ <gray>DB cola pendiente: <white>%value%'
    db-pending-futures: ' <#DDDDDD>⏵ <gray>DB futures pendientes: <white>%value%'
    challenge-active: ' <#DDDDDD>⏵ <gray>Torneo diario activo: <white>%value%'
    challenge-active-special: ' <#DDDDDD>⏵ <gray>Evento especial activo: <white>%value%'
    participants: ' <#DDDDDD>⏵ <gray>Participantes cargados: <white>%value%'
    placed-cache: ' <#DDDDDD>⏵ <gray>Placed blocks cache: <white>%value%'
    papi-registered: ' <#DDDDDD>⏵ <gray>PAPI registrado: <white>%value%'
    end-task-active: ' <#DDDDDD>⏵ <gray>Task fin torneo: <white>%value%'
    schedule-managed: ' <#DDDDDD>⏵ <gray>Schedule managed: <white>%value%'
