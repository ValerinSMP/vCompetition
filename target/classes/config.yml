challenge:
  duration-minutes: 30

excluded-worlds:
  - "world_minapvp"

notifications:
  outrank:
    global-cooldown-ms: 15000
    global-server-cooldown-ms: 8000
    private-cooldown-ms: 30000
    summary-threshold: 3
    max-private-victims-per-event: 2
    global-top-cutoff: 3

performance:
  ranking-refresh-ms: 200

# ── Bossbar de participantes ─────────────────────────────────────────────────
# Aparece la primera vez que el jugador anota un punto en el torneo.
# Colores válidos: PINK | BLUE | RED | GREEN | YELLOW | PURPLE | WHITE
# Overlays válidos: PROGRESS | NOTCHED_6 | NOTCHED_10 | NOTCHED_12 | NOTCHED_20
# Placeholders del título: <rank> <points> <top1_name> <top1_points>
bossbar:
  daily:
    enabled: true
    color: YELLOW
    overlay: PROGRESS
    title: "<gray>#<yellow><rank></yellow> <dark_gray>| <aqua><points> pts</aqua> <dark_gray>| <gray>Top1: <gold><top1_name></gold> <dark_gray>— <yellow><top1_points></yellow>"
  special:
    enabled: true
    color: GREEN
    overlay: PROGRESS
    title: "<gray>#<yellow><rank></yellow> <dark_gray>| <aqua><points> pts</aqua> <dark_gray>| <gray>Top1: <gold><top1_name></gold> <dark_gray>— <yellow><top1_points></yellow>"

# ── Torneo diario ────────────────────────────────────────────────────────────
schedule:
  enabled: true
  start-on-bootstrap-if-inside-window: false
  timezone: "America/Santiago"
  challenge: "RANDOM"  # RANDOM o un tipo fijo: MINING|WOODCUTTING|FISHING|SLAYER|FARMING
  slots:
    - hour: 14
      minute: 0
    - hour: 20
      minute: 0
  check-interval-ticks: 600
  # duration-minutes: 30  # Si se omite, usa challenge.duration-minutes

# ── Evento especial (otoño / temporada) ─────────────────────────────────────
special-event:
  enabled: true
  start-on-bootstrap-if-inside-window: false
  timezone: "America/Santiago"
  challenge: "OTONO"   # Puede ser cualquier tipo, incluido OTONO
  duration-minutes: 60  # Duración propia del evento especial
  slots:
    - hour: 18
      minute: 30
  check-interval-ticks: 600

# ── FancyNpcs ────────────────────────────────────────────────────────────────
fancy-npcs:
  skin-refresh:
    enabled: false
    initial-delay-seconds: 20
    interval-seconds: 900
    invalid-username-retry-seconds: 1800
    force-fallback-when-offline-mode: false
    invalid-username-fallback-skins:
      - "Steve"
      - "Alex"
    mode: "RESPAWN"  # UPDATE | RESPAWN
    debug-logs: false
    top-npcs:
      top1: "npc_top_1"
      top2: "npc_top_2"
      top3: "npc_top_3"
    fallback-skins:
      global: "Steve"
      top1: ""
      top2: ""
      top3: ""
    # NPCs para el top del evento especial (slot 'special'). Vacío = deshabilitado para ese slot.
    top-npcs-special:
      top1: ""
      top2: ""
      top3: ""
    fallback-skins-special:
      global: ""
      top1: ""
      top2: ""
      top3: ""

# ── Tipos de competición ─────────────────────────────────────────────────────
competition-types:
  mining:
    materials:
      # Overworld ores
      - COAL_ORE
      - DEEPSLATE_COAL_ORE
      - COPPER_ORE
      - DEEPSLATE_COPPER_ORE
      - IRON_ORE
      - DEEPSLATE_IRON_ORE
      - GOLD_ORE
      - DEEPSLATE_GOLD_ORE
      - LAPIS_ORE
      - DEEPSLATE_LAPIS_ORE
      - REDSTONE_ORE
      - DEEPSLATE_REDSTONE_ORE
      - EMERALD_ORE
      - DEEPSLATE_EMERALD_ORE
      - DIAMOND_ORE
      - DEEPSLATE_DIAMOND_ORE
      # Nether
      - NETHER_QUARTZ_ORE
      - NETHER_GOLD_ORE
      - ANCIENT_DEBRIS
    # rewards: (opcional) Si se define aquí, tiene prioridad sobre rewards.top1/2/3
    # rewards:
    #   top1:
    #     commands:
    #       - "give %player% diamond 10"
    #   participant:
    #     commands: []

  woodcutting:
    materials:
      # Overworld logs
      - OAK_LOG
      - SPRUCE_LOG
      - BIRCH_LOG
      - JUNGLE_LOG
      - ACACIA_LOG
      - DARK_OAK_LOG
      - MANGROVE_LOG
      - CHERRY_LOG
      - PALE_OAK_LOG     # 1.21.2
      - BAMBOO_BLOCK     # 1.20 - madera de bambú
      # Nether
      - CRIMSON_STEM
      - WARPED_STEM
      # Stripped (un árbol ya raspado por otro jugador sigue siendo el mismo tronco natural
      # al romperlo — sin esto, esos troncos no contaban)
      - STRIPPED_OAK_LOG
      - STRIPPED_SPRUCE_LOG
      - STRIPPED_BIRCH_LOG
      - STRIPPED_JUNGLE_LOG
      - STRIPPED_ACACIA_LOG
      - STRIPPED_DARK_OAK_LOG
      - STRIPPED_MANGROVE_LOG
      - STRIPPED_CHERRY_LOG
      - STRIPPED_PALE_OAK_LOG
      - STRIPPED_BAMBOO_BLOCK
      - STRIPPED_CRIMSON_STEM
      - STRIPPED_WARPED_STEM

  fishing:
    materials:
      - COD
      - SALMON
      - PUFFERFISH
      - TROPICAL_FISH

  slayer:
    mobs:
      # Overworld comunes
      - ZOMBIE
      - ZOMBIE_VILLAGER
      - HUSK
      - DROWNED
      - SKELETON
      - STRAY
      - BOGGED           # 1.21
      - CREEPER
      - SPIDER
      - CAVE_SPIDER
      - ENDERMAN
      - ENDERMITE
      - WITCH
      - PHANTOM
      # Illagers
      - PILLAGER
      - VINDICATOR
      - EVOKER
      - VEX
      - RAVAGER
      - ILLUSIONER
      # Nether
      - ZOMBIFIED_PIGLIN
      - PIGLIN
      - PIGLIN_BRUTE
      - HOGLIN
      - ZOGLIN
      - WITHER_SKELETON
      - BLAZE
      - GHAST
      - MAGMA_CUBE
      - BREEZE           # 1.21
      # Otros
      - GUARDIAN
      - ELDER_GUARDIAN
      - SHULKER
      - SLIME
      - SILVERFISH
      - WARDEN           # 1.19
      - CREAKING         # 1.21.2
      # Nota: WITHER y ENDER_DRAGON quedan fuera a propósito (bosses únicos, darían
      # el torneo entero de un solo kill). Mobs pasivos/de granja tampoco se incluyen.

  farming:
    materials:
      # Cultivos estándar
      - WHEAT
      - CARROTS
      - POTATOES
      - BEETROOTS
      # Plantas
      - SUGAR_CANE
      - BAMBOO           # 1.14
      - KELP             # 1.13
      - MELON
      - PUMPKIN
      - NETHER_WART
      - COCOA
      - SWEET_BERRY_BUSH
      - CAVE_VINES       # 1.17 - glow berries (segmento cabeza, con edad)
      - CAVE_VINES_PLANT # 1.17 - glow berries (segmentos colgantes)
      # Nota: COCOA, SWEET_BERRY_BUSH y CAVE_VINES(_PLANT) se cosechan normalmente con
      # click derecho (no rompen el bloque) — ver CompetitionListener#onPlayerInteract.
      # Sniffer (1.20)
      - TORCHFLOWER
      - PITCHER_PLANT

  # Evento otoñal: cosecha + follaje
  otono:
    materials:
      # Cosecha
      - PUMPKIN
      - CARVED_PUMPKIN
      - MELON
      - SUGAR_CANE
      - BEETROOTS
      - HAY_BLOCK
      # Follaje otoñal
      - OAK_LEAVES
      - BIRCH_LEAVES
      - JUNGLE_LEAVES
      - ACACIA_LEAVES
      - DARK_OAK_LEAVES
      - MANGROVE_LEAVES
      - CHERRY_LEAVES
      - AZALEA_LEAVES
      - FLOWERING_AZALEA_LEAVES
      - SHORT_GRASS
      - FERN
    # Recompensas propias del evento especial (sobreescriben rewards.top1/2/3)
    rewards:
      top1:
        display: "1 Llave Otoño"
        commands:
          - "crate key give %player% otono 1"
      top2:
        display: "1 Llave Otoño"
        commands:
          - "crate key give %player% otono 1"
      top3:
        display: "1 Llave Otoño"
        commands:
          - "crate key give %player% otono 1"
      participant:
        commands:
          - "recurrency give %player% 25 shards"

# ── Recompensas globales (usadas si el tipo no define las suyas) ──────────────
rewards:
  top1:
    display: "10 Diamantes + $500"
    commands:
      - "give %player% diamond 10"
      - "eco add %player% 500"
  top2:
    display: "6 Diamantes + $300"
    commands:
      - "give %player% diamond 6"
      - "eco add %player% 300"
  top3:
    display: "3 Diamantes + $150"
    commands:
      - "give %player% diamond 3"
      - "eco add %player% 150"
  participant:
    commands: []
    # Ejemplo: "give %player% bread 2"
