name: vCompetition
version: 1.0.0
main: com.valerinsmp.vcompetition.VCompetitionPlugin
api-version: '1.21'
authors: [ValerinSMP]
description: Sistema de retos semanales de farmeo con anti-exploit estricto.
softdepend: [PlaceholderAPI, FancyNpcs]

commands:
  vcompetition:
    aliases: [competition, torneos, torneo]
    description: Comandos de torneos para jugadores
    usage: /torneos [status|top|help]
  vcompetitionadmin:
    aliases: [torneoadmin]
    description: Comandos de administración de torneos
    usage: /torneoadmin <start|stop|startspecial|stopspecial|...>

permissions:
  vcompetition.use:
    description: Usar comandos de torneos para jugadores
    default: true
  vcompetition.admin:
    description: Permiso global de administración de torneos
    default: op
    children:
      vcompetition.admin.*: true
  vcompetition.admin.*:
    description: Todos los subcomandos admin de vCompetition
    default: op
    children:
      vcompetition.admin.start: true
      vcompetition.admin.startuntilsunday: true
      vcompetition.admin.stop: true
      vcompetition.admin.stopnorewards: true
      vcompetition.admin.startspecial: true
      vcompetition.admin.stopspecial: true
      vcompetition.admin.stopspecialnorewards: true
      vcompetition.admin.edit: true
      vcompetition.admin.addpoints: true
      vcompetition.admin.removepoints: true
      vcompetition.admin.editspecial: true
      vcompetition.admin.addpointsspecial: true
      vcompetition.admin.removepointsspecial: true
      vcompetition.admin.reload: true
      vcompetition.admin.status: true
      vcompetition.admin.top: true
      vcompetition.admin.setduration: true
      vcompetition.admin.resetplaced: true
      vcompetition.admin.refreshskins: true
      vcompetition.admin.debug: true
  vcompetition.admin.start:
    description: Iniciar reto manualmente
    default: op
  vcompetition.admin.startuntilsunday:
    description: Iniciar reto hasta el cierre semanal configurado
    default: op
  vcompetition.admin.stop:
    description: Finalizar reto diario manualmente
    default: op
  vcompetition.admin.stopnorewards:
    description: Detener reto diario sin recompensas
    default: op
  vcompetition.admin.startspecial:
    description: Iniciar evento especial manualmente
    default: op
  vcompetition.admin.stopspecial:
    description: Finalizar evento especial manualmente
    default: op
  vcompetition.admin.stopspecialnorewards:
    description: Detener evento especial sin recompensas
    default: op
  vcompetition.admin.editspecial:
    description: Editar puntaje absoluto en evento especial
    default: op
  vcompetition.admin.addpointsspecial:
    description: Agregar puntos en evento especial
    default: op
  vcompetition.admin.removepointsspecial:
    description: Quitar puntos en evento especial
    default: op
  vcompetition.admin.edit:
    description: Editar puntaje absoluto
    default: op
  vcompetition.admin.addpoints:
    description: Agregar puntos a jugador
    default: op
  vcompetition.admin.removepoints:
    description: Quitar puntos a jugador
    default: op
  vcompetition.admin.reload:
    description: Recargar configuración
    default: op
  vcompetition.admin.status:
    description: Ver estado del reto
    default: op
  vcompetition.admin.top:
    description: Ver top del reto
    default: op
  vcompetition.admin.setduration:
    description: Configurar duración en días
    default: op
  vcompetition.admin.resetplaced:
    description: Limpiar cache de bloques colocados
    default: op
  vcompetition.admin.refreshskins:
    description: Forzar actualización de skins de NPC top
    default: op
  vcompetition.admin.debug:
    description: Ver debug técnico
    default: op