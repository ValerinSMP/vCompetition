challenge:
  duration-minutes: 30

excluded-worlds:
  - "world_minapvp"

notifications:
  outrank:
    global-cooldown-ms: 15000
    global-server-cooldown-ms: 8000
    private-cooldown-ms: 30000
    summary-threshold: 3
    max-private-victims-per-event: 2
    global-top-cutoff: 3

performance:
  ranking-refresh-ms: 200

# ── Torneo diario ────────────────────────────────────────────────────────────
schedule:
  enabled: true
  start-on-bootstrap-if-inside-window: false
  timezone: "America/Santiago"
  challenge: "RANDOM"  # RANDOM o un tipo fijo: MINING|WOODCUTTING|FISHING|SLAYER|FARMING
  slots:
    - hour: 14
      minute: 0
    - hour: 20
      minute: 0
  check-interval-ticks: 600
  # duration-minutes: 30  # Si se omite, usa challenge.duration-minutes

# ── Evento especial (otoño / temporada) ─────────────────────────────────────
special-event:
  enabled: true
  start-on-bootstrap-if-inside-window: false
  timezone: "America/Santiago"
  challenge: "OTONO"   # Puede ser cualquier tipo, incluido OTONO
  duration-minutes: 60  # Duración propia del evento especial
  slots:
    - hour: 18
      minute: 30
  check-interval-ticks: 600

# ── FancyNpcs ────────────────────────────────────────────────────────────────
fancy-npcs:
  skin-refresh:
    enabled: false
    initial-delay-seconds: 20
    interval-seconds: 900
    invalid-username-retry-seconds: 1800
    force-fallback-when-offline-mode: false
    invalid-username-fallback-skins:
      - "Steve"
      - "Alex"
    mode: "RESPAWN"  # UPDATE | RESPAWN
    debug-logs: false
    top-npcs:
      top1: "npc_top_1"
      top2: "npc_top_2"
      top3: "npc_top_3"
    fallback-skins:
      global: "Steve"
      top1: ""
      top2: ""
      top3: ""

# ── Tipos de competición ─────────────────────────────────────────────────────
competition-types:
  mining:
    materials:
      - COAL_ORE
      - DEEPSLATE_COAL_ORE
      - IRON_ORE
      - DEEPSLATE_IRON_ORE
      - GOLD_ORE
      - DEEPSLATE_GOLD_ORE
      - DIAMOND_ORE
      - DEEPSLATE_DIAMOND_ORE
    # rewards: (opcional) Si se define aquí, tiene prioridad sobre rewards.top1/2/3
    # rewards:
    #   top1:
    #     commands:
    #       - "give %player% diamond 10"
    #   participant:
    #     commands: []

  woodcutting:
    materials:
      - OAK_LOG
      - SPRUCE_LOG
      - BIRCH_LOG
      - JUNGLE_LOG
      - ACACIA_LOG
      - DARK_OAK_LOG
      - MANGROVE_LOG
      - CHERRY_LOG
      - pale_oak_log
      - CRIMSON_STEM
      - WARPED_STEM

  fishing:
    materials:
      - COD
      - SALMON
      - PUFFERFISH
      - TROPICAL_FISH

  slayer:
    mobs:
      - ZOMBIE
      - SKELETON
      - CREEPER
      - SPIDER
      - ENDERMAN
      - WITCH
      - HUSK
      - DROWNED
      - STRAY

  farming:
    materials:
      - WHEAT
      - CARROTS
      - POTATOES
      - BEETROOTS
      - SUGAR_CANE
      - MELON
      - PUMPKIN
      - NETHER_WART
      - COCOA
      - SWEET_BERRY_BUSH

  # Evento otoñal: cosecha + follaje
  otono:
    materials:
      # Cosecha
      - PUMPKIN
      - CARVED_PUMPKIN
      - MELON
      - SUGAR_CANE
      - BEETROOTS
      - HAY_BLOCK
      # Follaje otoñal
      - OAK_LEAVES
      - BIRCH_LEAVES
      - JUNGLE_LEAVES
      - ACACIA_LEAVES
      - DARK_OAK_LEAVES
      - MANGROVE_LEAVES
      - CHERRY_LEAVES
      - AZALEA_LEAVES
      - FLOWERING_AZALEA_LEAVES
      - SHORT_GRASS
      - FERN
    # Recompensas propias del evento especial (sobreescriben rewards.top1/2/3)
    rewards:
      top1:
        commands:
          - "crate key give %player% otono 1"
      top2:
        commands:
          - "crate key give %player% otono 1"
      top3:
        commands:
          - "crate key give %player% otono 1"
      participant:
        commands:
          - "recurrency give %player% 25 shards"

# ── Recompensas globales (usadas si el tipo no define las suyas) ──────────────
rewards:
  top1:
    commands:
      - "give %player% diamond 10"
      - "eco add %player% 500"
  top2:
    commands:
      - "give %player% diamond 6"
      - "eco add %player% 300"
  top3:
    commands:
      - "give %player% diamond 3"
      - "eco add %player% 150"
  participant:
    commands: []
    # Ejemplo: "give %player% bread 2"
